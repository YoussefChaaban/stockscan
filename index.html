<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GreenVine Scan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7f2;
    --surface: #ffffff;
    --surface2: #eef2ea;
    --green-dark: #2d5a1b;
    --green-mid: #3d7a25;
    --green-light: #5a9e3a;
    --green-pale: #d4e8c8;
    --accent: #e8621a;
    --text: #1a2e10;
    --muted: #7a8f70;
    --danger: #c0392b;
    --border: #d0dcc8;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  button, input, textarea, select { touch-action: manipulation; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ─── PIN LOGIN ─────────────────────────────────────── */
  #pin-screen {
    position: fixed; inset: 0; background: var(--green-dark);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; gap: 0;
  }

  .pin-logo {
    margin-bottom: 28px;
  }

  .pin-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 900; color: var(--white);
    letter-spacing: -0.5px; margin-bottom: 4px;
  }

  .pin-sub {
    font-size: 12px; color: var(--green-pale); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 36px;
  }

  .pin-display {
    display: flex; gap: 14px; margin-bottom: 32px;
  }

  .pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--green-pale); background: transparent;
    transition: background 0.15s;
  }

  .pin-dot.filled { background: var(--green-pale); }

  .pin-keypad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; width: 260px;
  }

  .pin-key {
    height: 64px; border: none; border-radius: 12px;
    background: rgba(255,255,255,0.1); color: var(--white);
    font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 600;
    cursor: pointer; transition: all 0.1s; display: flex;
    align-items: center; justify-content: center;
    -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }

  .pin-key:active { background: rgba(255,255,255,0.25); transform: scale(0.95); }
  .pin-key.delete { font-size: 18px; background: rgba(255,255,255,0.05); }
  .pin-key.empty  { background: transparent; cursor: default; }

  .pin-error {
    margin-top: 20px; color: #ff8a80; font-size: 13px;
    font-weight: 600; min-height: 20px; text-align: center;
  }

  .pin-staff-name {
    margin-top: 16px; color: var(--green-pale); font-size: 13px;
    font-weight: 500; min-height: 20px;
  }

  /* ─── HEADER ────────────────────────────────────────── */
  #app { display: none; flex-direction: column; flex: 1; }

  header {
    background: var(--green-dark); padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  .logo-wrap { display: flex; align-items: center; gap: 10px; }

  .logo-text { display: flex; flex-direction: column; line-height: 1; }
  .logo-top { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 900; color: var(--white); }
  .logo-bottom { font-size: 10px; color: var(--green-pale); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .staff-chip {
    font-size: 11px; color: var(--green-pale); font-weight: 600;
    background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px;
  }

  .order-badge {
    background: var(--accent); color: var(--white);
    font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 20px;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .order-badge:active { transform: scale(0.95); }

  /* ─── TABS ───────────────────────────────────────────── */
  .tabs { display: flex; background: var(--green-dark); border-bottom: 3px solid var(--green-mid); }
  .tab {
    flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 600;
    color: var(--green-pale); cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -3px; transition: all 0.2s; letter-spacing: 0.8px; text-transform: uppercase;
  }
  .tab.active { color: var(--white); border-bottom-color: var(--accent); background: rgba(255,255,255,0.05); }

  .view { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
  .view.active { display: flex; }

  /* ─── SCAN AREA ──────────────────────────────────────── */
  .scan-area { position: relative; background: #111; height: 220px; overflow: hidden; }
  #scanner-container { width: 100%; height: 100%; position: relative; }
  #scanner-container video { width: 100%; height: 100%; object-fit: cover; }
  #scanner-container canvas.drawingBuffer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 230px; height: 110px; position: relative; }
  .scan-frame::before, .scan-frame::after, .scan-frame .c-br, .scan-frame .c-bl {
    content: ''; position: absolute; width: 22px; height: 22px; border-color: var(--green-pale); border-style: solid;
  }
  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
  .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; }
  .scan-frame .c-br   { bottom: 0; right: 0; border-width: 0 3px 3px 0; }
  .scan-frame .c-bl   { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
  .scan-line {
    position: absolute; left: 8px; right: 8px; height: 2px;
    background: var(--green-light); box-shadow: 0 0 10px var(--green-light);
    animation: scanline 2s ease-in-out infinite;
  }
  @keyframes scanline { 0%, 100% { top: 8px; } 50% { top: 94px; } }
  .scan-placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px; color: #666; background: #111;
  }

  .green-stripe { height: 4px; background: linear-gradient(90deg, var(--green-dark), var(--green-light), var(--green-dark)); }

  /* ─── CONTROLS ───────────────────────────────────────── */
  .scan-controls { padding: 14px 16px; display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 13px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--green-mid); color: var(--white); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .manual-input { padding: 0 16px 14px; display: flex; gap: 8px; }
  .manual-input input {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 11px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .manual-input input:focus { border-color: var(--green-mid); }
  .manual-input input::placeholder { color: var(--muted); }
  .manual-input button {
    padding: 11px 16px; background: var(--green-pale); border: 1.5px solid var(--green-mid);
    border-radius: 8px; color: var(--green-dark); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }

  /* ─── PRODUCT CARD ───────────────────────────────────── */
  .product-card {
    margin: 0 16px 16px; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; overflow: hidden; display: none;
    box-shadow: 0 2px 12px rgba(45,90,27,0.08);
  }
  .product-card.visible { display: block; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Product image */
  .product-image-wrap {
    width: 100%; height: 160px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .product-image-wrap img {
    max-height: 100%; max-width: 100%; object-fit: contain; padding: 12px;
  }
  .product-image-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--muted); font-size: 12px;
  }

  .product-card-body { padding: 16px; }

  .product-upc { font-size: 10px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
  .unknown-hint { font-size: 11px; color: var(--accent); margin-bottom: 10px; font-weight: 600; display: none; background: #fff5f0; border: 1px solid #f5c6a0; border-radius: 6px; padding: 8px 10px; }

  .product-name-input {
    width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--border);
    font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700;
    color: var(--text); outline: none; padding: 2px 0 6px; margin-bottom: 6px; transition: border-color 0.2s;
  }
  .product-name-input:focus { border-bottom-color: var(--green-mid); }

  .product-brand-input {
    width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--border);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--green-mid); outline: none; padding: 2px 0 6px; margin-bottom: 16px; transition: border-color 0.2s;
  }
  .product-brand-input:focus { border-bottom-color: var(--green-mid); }

  .product-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .meta-box { background: var(--surface2); border-radius: 8px; padding: 10px 12px; border: 1px solid var(--border); }
  .meta-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }

  .stock-edit { display: flex; align-items: center; gap: 6px; }
  .stock-edit input {
    width: 54px; background: var(--white); border: 1.5px solid var(--border); border-radius: 6px;
    padding: 5px; color: var(--text); font-size: 18px; font-weight: 700; text-align: center; outline: none;
  }
  .stock-edit input:focus { border-color: var(--green-mid); }
  .stock-edit button {
    width: 28px; height: 28px; border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--white); color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .stock-edit button:hover { background: var(--green-pale); }

  .upc-display { font-size: 11px; color: var(--muted); word-break: break-all; margin-top: 2px; font-family: monospace; }

  /* Notes */
  .notes-row { margin-bottom: 14px; }
  .notes-row label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px; font-weight: 600; }
  .notes-row textarea {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
    transition: border-color 0.2s; resize: none; height: 64px; line-height: 1.5;
  }
  .notes-row textarea:focus { border-color: var(--green-mid); }
  .notes-row textarea::placeholder { color: var(--muted); }

  .vendor-row { margin-bottom: 14px; }
  .vendor-row label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px; font-weight: 600; }
  .vendor-row input {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .vendor-row input:focus { border-color: var(--green-mid); }
  .vendor-row input::placeholder { color: var(--muted); }
  .vendor-saved { font-size: 11px; color: var(--green-mid); margin-top: 4px; font-weight: 600; }

  .order-section { display: flex; gap: 10px; align-items: flex-end; padding-top: 14px; border-top: 1.5px solid var(--border); }
  .order-qty-wrap { flex: 1; }
  .order-qty-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
  .qty-stepper { display: flex; align-items: center; gap: 8px; }
  .qty-stepper button {
    width: 34px; height: 34px; border: 1.5px solid var(--border); border-radius: 8px;
    background: var(--surface2); color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-stepper button:hover { background: var(--green-pale); }
  .qty-stepper input {
    width: 50px; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 6px; color: var(--text); font-size: 18px; font-weight: 700; text-align: center; outline: none;
  }

  .btn-add-order {
    padding: 10px 16px; background: var(--green-dark); color: var(--white); border: none;
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .btn-add-order:hover { background: var(--green-mid); }
  .btn-add-order:active { transform: scale(0.95); }
  .btn-add-order:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ─── TOAST ──────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green-dark); color: var(--white); padding: 12px 20px;
    border-radius: 50px; font-weight: 600; font-size: 13px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100; white-space: nowrap; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); }

  /* ─── LIST VIEWS ─────────────────────────────────────── */
  .view-header { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
  .view-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--green-dark); }
  .count-chip { font-size: 11px; background: var(--green-pale); color: var(--green-dark); padding: 4px 10px; border-radius: 20px; font-weight: 600; }

  /* Search bar */
  .search-wrap { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 9px 14px 9px 36px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--green-mid); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

  .item-list { padding: 12px 16px 20px; display: flex; flex-direction: column; gap: 8px; }

  .inv-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .inv-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .inv-info { flex: 1; min-width: 0; }
  .inv-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .inv-brand { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .inv-notes { font-size: 11px; color: var(--accent); margin-top: 2px; font-style: italic; }
  .inv-stock { font-size: 18px; font-weight: 700; flex-shrink: 0; }

  .order-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .order-info { flex: 1; min-width: 0; }
  .order-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .order-meta span { color: var(--green-mid); font-weight: 500; }
  .order-qty-badge { background: var(--green-dark); color: var(--white); font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }

  .export-bar { padding: 14px 16px; border-top: 1.5px solid var(--border); background: var(--surface); margin-top: auto; }
  .export-bar-row { display: flex; gap: 10px; }

  .loading-state { padding: 30px 20px; text-align: center; color: var(--muted); font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--green-pale); border-top-color: var(--green-mid); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-card { margin: 0 16px 12px; background: #fff8f7; border: 1.5px solid #f5c6c0; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--danger); }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .empty-icon { font-size: 44px; margin-bottom: 10px; opacity: 0.5; }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">
    <svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="45" cy="45" r="42" fill="#3d7a25" stroke="#5a9e3a" stroke-width="2"/>
      <circle cx="45" cy="45" r="32" fill="none" stroke="#d4e8c8" stroke-width="1.5" stroke-dasharray="4 3"/>
      <!-- Vine leaves around circle -->
      <ellipse cx="45" cy="16" rx="4" ry="6" fill="#5a9e3a" transform="rotate(0 45 16)"/>
      <ellipse cx="65" cy="24" rx="4" ry="6" fill="#5a9e3a" transform="rotate(60 65 24)"/>
      <ellipse cx="74" cy="45" rx="4" ry="6" fill="#5a9e3a" transform="rotate(90 74 45)"/>
      <ellipse cx="65" cy="66" rx="4" ry="6" fill="#5a9e3a" transform="rotate(120 65 66)"/>
      <ellipse cx="45" cy="74" rx="4" ry="6" fill="#5a9e3a" transform="rotate(0 45 74)"/>
      <ellipse cx="25" cy="66" rx="4" ry="6" fill="#5a9e3a" transform="rotate(-120 25 66)"/>
      <ellipse cx="16" cy="45" rx="4" ry="6" fill="#5a9e3a" transform="rotate(90 16 45)"/>
      <ellipse cx="25" cy="24" rx="4" ry="6" fill="#5a9e3a" transform="rotate(-60 25 24)"/>
      <!-- GV text -->
      <text x="45" y="40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="white">GREEN</text>
      <text x="45" y="54" text-anchor="middle" font-family="serif" font-size="10" fill="#d4e8c8" letter-spacing="3">VINE</text>
      <text x="45" y="65" text-anchor="middle" font-family="serif" font-size="7" fill="#d4e8c8" letter-spacing="2">MARKET</text>
    </svg>
  </div>
  <div class="pin-title">GreenVine Scan</div>
  <div class="pin-sub">Enter your PIN to continue</div>
  <div class="pin-display">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-keypad">
    <button class="pin-key" onclick="pinPress('1')" ontouchend="event.preventDefault();pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')" ontouchend="event.preventDefault();pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')" ontouchend="event.preventDefault();pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')" ontouchend="event.preventDefault();pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')" ontouchend="event.preventDefault();pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')" ontouchend="event.preventDefault();pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')" ontouchend="event.preventDefault();pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')" ontouchend="event.preventDefault();pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')" ontouchend="event.preventDefault();pinPress('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinPress('0')" ontouchend="event.preventDefault();pinPress('0')">0</button>
    <button class="pin-key delete" onclick="pinDelete()" ontouchend="event.preventDefault();pinDelete()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-staff-name" id="pin-staff-name"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo-wrap">

        <circle cx="45" cy="45" r="32" fill="none" stroke="#d4e8c8" stroke-width="1.5" stroke-dasharray="4 3"/>
        <ellipse cx="45" cy="16" rx="4" ry="6" fill="#5a9e3a"/>
        <ellipse cx="65" cy="24" rx="4" ry="6" fill="#5a9e3a" transform="rotate(60 65 24)"/>
        <ellipse cx="74" cy="45" rx="4" ry="6" fill="#5a9e3a" transform="rotate(90 74 45)"/>
        <ellipse cx="65" cy="66" rx="4" ry="6" fill="#5a9e3a" transform="rotate(120 65 66)"/>
        <ellipse cx="45" cy="74" rx="4" ry="6" fill="#5a9e3a"/>
        <ellipse cx="25" cy="66" rx="4" ry="6" fill="#5a9e3a" transform="rotate(-120 25 66)"/>
        <ellipse cx="16" cy="45" rx="4" ry="6" fill="#5a9e3a" transform="rotate(90 16 45)"/>
        <ellipse cx="25" cy="24" rx="4" ry="6" fill="#5a9e3a" transform="rotate(-60 25 24)"/>
        <text x="45" y="40" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="white">GREEN</text>
        <text x="45" y="52" text-anchor="middle" font-family="serif" font-size="9" fill="#d4e8c8" letter-spacing="2">VINE</text>
      </svg>
      <div class="logo-text">
        <span class="logo-top">GreenVine</span>
        <span class="logo-bottom">Scan</span>
      </div>
    </div>
    <div class="header-right">
      <div class="staff-chip" id="staff-chip">👤 —</div>
      <button class="order-badge" onclick="switchTab('orders')">🛒 <span id="order-count">0</span></button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('scan')">Scan</div>
    <div class="tab" onclick="switchTab('inventory')">Inventory</div>
    <div class="tab" onclick="switchTab('orders')">Orders</div>
  </div>

  <!-- SCAN VIEW -->
  <div class="view active" id="view-scan">
    <div class="scan-area">
      <div id="scanner-container">
        <div class="scan-placeholder" id="scan-placeholder">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#3d7a25" stroke-width="1.5" opacity="0.7">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20h3"/>
          </svg>
          <span style="font-size:13px;color:#555">Camera off</span>
        </div>
      </div>
      <div class="scan-overlay" id="scan-overlay" style="display:none">
        <div class="scan-frame">
          <div class="c-br"></div><div class="c-bl"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <div class="green-stripe"></div>

    <div class="scan-controls">
      <button class="btn btn-primary" id="btn-scan" onclick="toggleScanner()">📷 Start Camera</button>
      <button class="btn btn-secondary" onclick="resetScan()">Clear</button>
    </div>

    <div class="manual-input">
      <input type="text" id="manual-upc" placeholder="Enter UPC manually..." inputmode="numeric" />
      <button onclick="lookupManual()">Look up</button>
    </div>

    <div id="loading" class="loading-state" style="display:none">
      <div class="spinner"></div>Looking up product...
    </div>

    <div id="error-msg" class="error-card" style="display:none"></div>

    <div class="product-card" id="product-card">
      <!-- Product image -->
      <div class="product-image-wrap" id="product-image-wrap">
        <div class="product-image-placeholder">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span style="font-size:11px">No image</span>
        </div>
      </div>

      <div class="product-card-body">
        <div class="product-upc" id="p-upc"></div>
        <div class="unknown-hint" id="unknown-hint">⚠ Product not found — fill in details below</div>
        <input class="product-name-input" id="p-name" type="text" placeholder="Enter product name..." onchange="saveProductData()" />
        <input class="product-brand-input" id="p-brand" type="text" placeholder="Enter brand..." onchange="saveProductData()" />

        <div class="product-meta">
          <div class="meta-box">
            <div class="meta-label">In Stock</div>
            <div class="stock-edit">
              <button onclick="adjustStock(-1)">−</button>
              <input type="number" id="p-stock" value="0" min="0" onchange="saveProductData()" />
              <button onclick="adjustStock(1)">+</button>
            </div>
          </div>
          <div class="meta-box">
            <div class="meta-label">UPC</div>
            <div class="upc-display" id="p-upc-display"></div>
          </div>
        </div>

        <div class="vendor-row">
          <label>Vendor / Supplier</label>
          <input type="text" id="p-vendor" placeholder="Who do you order this from?" onchange="saveProductData()" />
          <div class="vendor-saved" id="vendor-saved" style="display:none">✓ Vendor saved from last scan</div>
        </div>

        <div class="notes-row">
          <label>Notes</label>
          <textarea id="p-notes" placeholder="e.g. Order every 2 weeks, seasonal item..." onchange="saveProductData()"></textarea>
        </div>

        <div class="order-section">
          <div class="order-qty-wrap">
            <div class="order-qty-label">Order Qty</div>
            <div class="qty-stepper">
              <button onclick="adjustQty(-1)">−</button>
              <input type="number" id="order-qty" value="1" min="1" />
              <button onclick="adjustQty(1)">+</button>
            </div>
          </div>
          <button class="btn-add-order" id="btn-add-order" onclick="addToOrder()">+ Add to Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- INVENTORY VIEW -->
  <div class="view" id="view-inventory">
    <div class="view-header">
      <div class="view-title">Inventory</div>
      <div class="count-chip" id="inv-count">0 items</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="inv-search" placeholder="Search products..." oninput="filterInventory()" />
    </div>
    <div class="item-list" id="inv-list">
      <div class="empty-state"><div class="empty-icon">📦</div>No items yet.</div>
    </div>
  </div>

  <!-- ORDER LIST VIEW -->
  <div class="view" id="view-orders">
    <div class="view-header">
      <div class="view-title">Order List</div>
      <div class="count-chip" id="orders-count">0 items</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="order-search" placeholder="Search orders..." oninput="filterOrders()" />
    </div>
    <div class="item-list" id="order-list">
      <div class="empty-state"><div class="empty-icon">🛒</div>No orders yet.</div>
    </div>
    <div class="export-bar">
      <div class="export-bar-row">
        <button class="btn btn-secondary" style="flex:1" onclick="clearOrders()">Clear All</button>
        <button class="btn btn-primary" style="flex:2" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxitPdYJYZZqCzz8_Ncf1g0gchsABE1NssFaezAr7gtZuyx9GU3J3qwest3MwSsyXKoXA/exec';

let currentProduct = null;
let scannerRunning = false;
let lastScanned    = '';
let ordersCache    = [];
let inventoryCache = [];
let currentStaff   = '';
let pinBuffer      = '';
let scanCounts     = {};

// ─── API ──────────────────────────────────────────────────
async function api(params) {
  try {
    const res = await fetch(API_URL + '?' + new URLSearchParams(params), { method: 'GET' });
    return JSON.parse(await res.text());
  } catch (e) { return { error: e.message }; }
}

// ─── PIN ──────────────────────────────────────────────────
function pinPress(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  if (pinBuffer.length === 4) {
    setTimeout(checkPin, 150);
  }
}

function pinDelete() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}

async function checkPin() {
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-staff-name').textContent = 'Checking...';
  
  try {
    const result = await api({ action: 'verifyPin', pin: pinBuffer });
    if (result.success) {
      currentStaff = result.name;
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('staff-chip').textContent = '👤 ' + currentStaff;
    } else {
      document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
      document.getElementById('pin-staff-name').textContent = '';
      pinBuffer = '';
      updatePinDots();
    }
  } catch (e) {
    document.getElementById('pin-error').textContent = 'Connection error. Try again.';
    document.getElementById('pin-staff-name').textContent = '';
    pinBuffer = '';
    updatePinDots();
  }
}

// ─── Tabs ─────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['scan','inventory','orders'][i] === name));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'inventory') loadInventory();
  if (name === 'orders')    loadOrders();
}

// ─── Scanner ──────────────────────────────────────────────
let zxingReader = null;

function toggleScanner() { scannerRunning ? stopScanner() : startScanner(); }

async function startScanner() {
  document.getElementById('scan-placeholder').style.display = 'none';
  document.getElementById('scan-overlay').style.display = 'flex';
  document.getElementById('btn-scan').textContent = '⏹ Stop Camera';

  // Try ZXing first (better for mobile and shelf labels)
  if (typeof ZXing !== 'undefined') {
    try {
      zxingReader = new ZXing.BrowserMultiFormatReader();
      const devices = await ZXing.BrowserMultiFormatReader.listVideoInputDevices();
      const backCamera = devices.find(d =>
        d.label.toLowerCase().includes('back') ||
        d.label.toLowerCase().includes('rear') ||
        d.label.toLowerCase().includes('environment')
      ) || devices[devices.length - 1];

      // Add video element if not present
      let video = document.getElementById('scanner-video');
      if (!video) {
        video = document.createElement('video');
        video.id = 'scanner-video';
        video.style.cssText = 'width:100%;height:100%;object-fit:cover;';
        document.getElementById('scanner-container').appendChild(video);
      }
      video.style.display = 'block';
      document.getElementById('scan-placeholder').style.display = 'none';

      scannerRunning = true;
      scanCounts = {};

      zxingReader.decodeFromVideoDevice(backCamera?.deviceId, 'scanner-video', (result, err) => {
        if (result) {
          const code = result.getText();
          if (!code || code === lastScanned) return;
          scanCounts[code] = (scanCounts[code] || 0) + 1;
          if (scanCounts[code] >= 2) {
            lastScanned = code;
            scanCounts = {};
            stopScanner();
            lookupUPC(code);
          }
        }
      });
      return;
    } catch (e) {
      console.log('ZXing failed, falling back to Quagga:', e);
      if (zxingReader) { zxingReader.reset(); zxingReader = null; }
    }
  }

  // Fallback to Quagga
  Quagga.init({
    inputStream: {
      name: "Live", type: "LiveStream",
      target: document.getElementById('scanner-container'),
      constraints: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
    },
    decoder: { readers: ["ean_reader","upc_reader","upc_e_reader","code_128_reader","code_39_reader","code_93_reader"], multiple: false },
    locate: true, numOfWorkers: 2, frequency: 5
  }, (err) => {
    if (err) { showError("Camera access denied. Use manual entry."); stopScanner(); return; }
    Quagga.start();
    scannerRunning = true;
  });

  Quagga.onDetected((result) => {
    const code = result.codeResult.code;
    if (!code || code === lastScanned) return;
    const errors = result.codeResult.decodedCodes.filter(c => c.error !== undefined);
    if (errors.length > 0) {
      const avgError = errors.reduce((s, c) => s + c.error, 0) / errors.length;
      if (avgError > 0.35) return;
    }
    scanCounts[code] = (scanCounts[code] || 0) + 1;
    if (scanCounts[code] >= 3) {
      lastScanned = code;
      scanCounts = {};
      stopScanner();
      lookupUPC(code);
    }
  });
}

function stopScanner() {
  if (zxingReader) { zxingReader.reset(); zxingReader = null; }
  if (scannerRunning && typeof Quagga !== 'undefined') {
    try { Quagga.stop(); } catch(e) {}
  }
  scannerRunning = false;
  scanCounts = {};
  const video = document.getElementById('scanner-video');
  if (video) video.style.display = 'none';
  document.getElementById('btn-scan').textContent = '📷 Start Camera';
  document.getElementById('scan-overlay').style.display = 'none';
  document.getElementById('scan-placeholder').style.display = 'flex';
}

// ─── Lookup ───────────────────────────────────────────────
function lookupManual() {
  const val = document.getElementById('manual-upc').value.trim();
  if (val) lookupUPC(val);
}

async function lookupUPC(upc) {
  document.getElementById('product-card').classList.remove('visible');
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    // Run both calls in parallel
    const [catalogData, inventoryData] = await Promise.all([
      api({ action: 'lookupProduct', upc }),
      api({ action: 'getProduct', upc })
    ]);

    document.getElementById('loading').style.display = 'none';

    showProduct({
      upc,
      name:      catalogData.found ? (catalogData.name   || '') : '',
      brand:     catalogData.found ? (catalogData.brand  || '') : '',
      vendor:    catalogData.found ? (catalogData.vendor || '') : '',
      stock:     inventoryData.found ? inventoryData.stock : 0,
      notes:     inventoryData.found ? (inventoryData.notes || '') : '',
      image:     '',
      isKnown:   inventoryData.found,
      foundInDB: catalogData.found || inventoryData.found
    });

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    showError('Network error. Check your connection.');
  }
}

function showProduct(product) {
  currentProduct = product;

  // Image
  const wrap = document.getElementById('product-image-wrap');
  if (product.image) {
    wrap.style.display = 'flex';
    wrap.innerHTML = `<img src="${product.image}" alt="Product" onerror="this.parentNode.style.display='none'" />`;
  } else {
    wrap.style.display = 'none';
  }

  document.getElementById('p-upc').textContent          = 'UPC: ' + product.upc;
  document.getElementById('p-upc-display').textContent  = product.upc;
  document.getElementById('p-name').value               = product.name  || '';
  document.getElementById('p-brand').value              = product.brand || '';
  document.getElementById('p-stock').value              = product.stock || 0;
  document.getElementById('p-vendor').value             = product.vendor || '';
  document.getElementById('p-notes').value              = product.notes || '';
  document.getElementById('order-qty').value            = 1;
  document.getElementById('unknown-hint').style.display = product.foundInDB ? 'none' : 'block';
  document.getElementById('vendor-saved').style.display = (product.isKnown && product.vendor) ? 'block' : 'none';
  document.getElementById('product-card').classList.add('visible');
}

// ─── Save ─────────────────────────────────────────────────
async function saveProductData() {
  if (!currentProduct) return;
  const name   = document.getElementById('p-name').value.trim();
  const brand  = document.getElementById('p-brand').value.trim();
  const stock  = parseInt(document.getElementById('p-stock').value) || 0;
  const vendor = document.getElementById('p-vendor').value.trim();
  const notes  = document.getElementById('p-notes').value.trim();
  currentProduct = { ...currentProduct, name, brand, stock, vendor, notes };
  await api({ action: 'saveProduct', upc: currentProduct.upc, name, brand, vendor, stock, notes });
}

function adjustStock(delta) {
  const input = document.getElementById('p-stock');
  input.value = Math.max(0, parseInt(input.value || 0) + delta);
  saveProductData();
}

function adjustQty(delta) {
  const input = document.getElementById('order-qty');
  input.value = Math.max(1, parseInt(input.value || 1) + delta);
}

async function addToOrder() {
  if (!currentProduct) return;
  const name = document.getElementById('p-name').value.trim();
  if (!name) { showToast('Please enter a product name first', true); return; }

  const btn = document.getElementById('btn-add-order');
  btn.textContent = 'Adding...'; btn.disabled = true;
  await saveProductData();

  const qty    = parseInt(document.getElementById('order-qty').value) || 1;
  const vendor = document.getElementById('p-vendor').value.trim();
  const brand  = document.getElementById('p-brand').value.trim();

  const result = await api({ action: 'addOrder', upc: currentProduct.upc, name, brand, vendor, qty, staff: currentStaff });
  btn.textContent = '+ Add to Order'; btn.disabled = false;

  if (result.error) { showToast('Error saving order', true); return; }
  ordersCache.push({ ...currentProduct, name, brand, qty, vendor, staff: currentStaff });
  document.getElementById('order-count').textContent = ordersCache.length;
  showToast(`Added ${qty}× ${name} to order`);
}

// ─── Inventory ────────────────────────────────────────────
async function loadInventory() {
  const list = document.getElementById('inv-list');
  list.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
  const data = await api({ action: 'getInventory' });
  inventoryCache = data.items || [];
  document.getElementById('inv-count').textContent = inventoryCache.length + ' items';
  renderInventory(inventoryCache);
}

function filterInventory() {
  const q = document.getElementById('inv-search').value.toLowerCase();
  const filtered = inventoryCache.filter(i =>
    (i.name||'').toLowerCase().includes(q) ||
    (i.brand||'').toLowerCase().includes(q) ||
    (i.vendor||'').toLowerCase().includes(q)
  );
  renderInventory(filtered);
}

function renderInventory(items) {
  const list = document.getElementById('inv-list');
  if (!items.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div>No items found.</div>`; return; }
  list.innerHTML = items.sort((a,b) => Number(a.stock) - Number(b.stock)).map(item => {
    const low   = Number(item.stock) <= 5;
    const color = low ? 'var(--danger)' : 'var(--green-mid)';
    return `<div class="inv-item">
      <div class="inv-dot" style="background:${color}"></div>
      <div class="inv-info">
        <div class="inv-name">${item.name || 'Unknown'}</div>
        <div class="inv-brand">${item.brand || ''}${item.vendor ? ' · ' + item.vendor : ''}</div>
        ${item.notes ? `<div class="inv-notes">📝 ${item.notes}</div>` : ''}
      </div>
      <div class="inv-stock" style="color:${color}">${item.stock}</div>
    </div>`;
  }).join('');
}

// ─── Orders ───────────────────────────────────────────────
async function loadOrders() {
  const list = document.getElementById('order-list');
  list.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading...</div>`;
  const data = await api({ action: 'getOrders' });
  ordersCache = data.orders || [];
  document.getElementById('orders-count').textContent = ordersCache.length + ' items';
  document.getElementById('order-count').textContent  = ordersCache.length;
  renderOrders(ordersCache);
}

function filterOrders() {
  const q = document.getElementById('order-search').value.toLowerCase();
  const filtered = ordersCache.filter(o =>
    (o.name||'').toLowerCase().includes(q) ||
    (o.vendor||'').toLowerCase().includes(q) ||
    (o.brand||'').toLowerCase().includes(q)
  );
  renderOrders(filtered);
}

function renderOrders(orders) {
  const list = document.getElementById('order-list');
  if (!orders.length) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div>No orders found.</div>`; return; }
  list.innerHTML = orders.map(o => `
    <div class="order-item">
      <div class="order-info">
        <div class="order-name">${o.name}</div>
        <div class="order-meta">${o.vendor || 'No vendor'} · ${o.brand || ''} ${o.staff ? '· <span>' + o.staff + '</span>' : ''}</div>
      </div>
      <div class="order-qty-badge">×${o.qty}</div>
    </div>`).join('');
}

async function clearOrders() {
  if (!confirm('Clear all orders?')) return;
  await api({ action: 'clearOrders' });
  ordersCache = [];
  document.getElementById('order-count').textContent = '0';
  loadOrders();
  showToast('Orders cleared');
}

function exportCSV() {
  if (!ordersCache.length) { showToast('No orders to export'); return; }
  const rows = [['Date','Product Name','Brand','UPC','Order Qty','Vendor','Staff']];
  ordersCache.forEach(o => rows.push([o.date||'', o.name, o.brand||'', o.upc, o.qty, o.vendor||'', o.staff||'']));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `greenvine-orders-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV exported!');
}

// ─── Helpers ──────────────────────────────────────────────
function resetScan() {
  stopScanner(); currentProduct = null; lastScanned = '';
  document.getElementById('product-card').classList.remove('visible');
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('manual-upc').value = '';
}

function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; }

let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (isError ? ' error' : ''); t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
